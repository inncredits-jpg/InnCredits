# Nixpacks configuration for Node.js backend

[phases.setup]
# Install Node.js 20
nixPkgs = ["nodejs_20"]

[phases.install]
# Install npm dependencies
cmds = ["npm install"]

[phases.start]
# Start the server
cmds = ["node server.js"]

# Build configuration
[build]
install = ["npm install"]
start = "node server.js"

# Ensure Node.js is available
[environment]
NODE_ENV = "production"
